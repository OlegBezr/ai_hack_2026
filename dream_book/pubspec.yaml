name: dream_book
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  sentry_flutter: ^9.22.0
  flutter:
    sdk: flutter
  http: ^1.2.0
  crypto: ^3.0.3
  flutter_web_auth_2: ^4.0.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  turnable_page: 1.0.0
  record: ^7.1.0
  just_audio: ^0.10.5
  path_provider: ^2.1.6
  rive: ^0.14.8
  supabase_flutter: ^2.15.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  # Voice Agent (live voice-to-voice book chat): one WebSocket to Deepgram does
  # STT + (Deepgram-managed) LLM + TTS. `web_socket_channel` carries the socket
  # (with the Deepgram key sent as a subprotocol in the browser); `web` drives
  # the Web Audio mic capture + raw-PCM playback in voice_audio_web.dart.
  web_socket_channel: ^3.0.3
  web: ^1.1.1

# Pinned: turnable_page 1.0.0 uses the removed `Pdfrx.getCacheDirectory` setter,
# which only exists in pdfrx 2.1.x (it became `cacheDirectoryPath` in later 2.x).
#
# turnable_page is vendored locally (packages/turnable_page) so we can patch the
# page-flip render geometry — the upstream 1.0.0 mispaints revealed pages during
# double-mode flips. See packages/turnable_page/PATCHES.md.
dependency_overrides:
  pdfrx: 2.1.3
  pdfrx_engine: 0.1.12
  turnable_page:
    path: packages/turnable_page

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/rive/
    - assets/audio/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: ai-hack-2026
